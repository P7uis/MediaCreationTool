        function t(key, params) {
            const dict = I18N[currentLang] || I18N.en;
            const fall = I18N.en;
            let s = dict[key];
            if (s == null || s === '') s = fall[key] != null ? fall[key] : key;
            if (params && typeof params === 'object') {
                Object.keys(params).forEach((k) => {
                    s = s.split('{' + k + '}').join(String(params[k]));
                });
            }
            return s;
        }

        function detectInitialLang() {
            try {
                const saved = localStorage.getItem('mediacapture-lang');
                if (saved === 'nl' || saved === 'en' || saved === 'de') return saved;
            } catch (e) {}
            const list =
                navigator.languages && navigator.languages.length
                    ? navigator.languages
                    : [navigator.language || 'en'];
            for (const raw of list) {
                const low = String(raw).toLowerCase();
                if (low.startsWith('nl')) return 'nl';
                if (low.startsWith('de')) return 'de';
                if (low.startsWith('en')) return 'en';
            }
            return 'en';
        }

        function syncRecordingButtonLabels() {
            if (recordButton) {
                recordButton.textContent = recordButton.classList.contains('recording')
                    ? t('btnStopRecord')
                    : t('btnStartRecord');
            }
            if (toggleScreenRecordingButton) {
                toggleScreenRecordingButton.textContent = toggleScreenRecordingButton.classList.contains('recording')
                    ? t('btnStopScreen')
                    : t('btnStartScreen');
            }
            if (toggleStreamCaptureButton) {
                toggleStreamCaptureButton.textContent = toggleStreamCaptureButton.classList.contains('recording')
                    ? t('btnStopStream')
                    : t('btnStartStream');
            }
            if (toggleAudioRecordingButton) {
                toggleAudioRecordingButton.textContent = toggleAudioRecordingButton.classList.contains('recording')
                    ? t('btnStopAudio')
                    : t('btnStartAudio');
            }
            if (toggleTimelapseButton) {
                toggleTimelapseButton.textContent = toggleTimelapseButton.classList.contains('recording')
                    ? t('btnStopTimelapse')
                    : t('btnStartTimelapse');
            }
        }

        function applyLanguage(lang) {
            if (lang !== 'nl' && lang !== 'en' && lang !== 'de') lang = 'en';
            currentLang = lang;
            try {
                localStorage.setItem('mediacapture-lang', lang);
            } catch (e) {}
            document.documentElement.lang = lang === 'de' ? 'de' : lang === 'nl' ? 'nl' : 'en';
            document.title = t('pageTitle');
            document.documentElement.style.setProperty('--await-camera-msg', JSON.stringify(t('awaitCamera')));

            document.querySelectorAll('[data-i18n]').forEach((el) => {
                if (el.closest('.lang-switcher')) return;
                const key = el.getAttribute('data-i18n');
                if (key) el.textContent = t(key);
            });
            document.querySelectorAll('[data-i18n-aria]').forEach((el) => {
                if (el.closest('.lang-switcher')) return;
                const key = el.getAttribute('data-i18n-aria');
                if (key) el.setAttribute('aria-label', t(key));
            });
            document.querySelectorAll('[data-i18n-title]').forEach((el) => {
                if (el.closest('.lang-switcher')) return;
                const key = el.getAttribute('data-i18n-title');
                if (key) el.setAttribute('title', t(key));
            });

            syncRecordingButtonLabels();
            if (typeof updateMuteToggleUI === 'function') updateMuteToggleUI();
            if (typeof updateMirrorToggleUI === 'function') updateMirrorToggleUI();
            try {
                if (typeof updateDeviceInfo === 'function') updateDeviceInfo();
            } catch (e) {}

            if (cameraResolutionSelect && cameraResolutionSelect.options.length) {
                const z = cameraResolutionSelect.options[0];

            document.querySelectorAll('.lang-switcher [data-lang]').forEach((b) => {
                const code = b.getAttribute('data-lang');
                const on = code === lang;
                b.classList.toggle('active', on);
                b.setAttribute('aria-pressed', on ? 'true' : 'false');
            });
        }

        /** Common sizes up through 8K; filtered by getCapabilities() (includes 5K / DCI-style heights). */
        const STANDARD_CAMERA_RESOLUTIONS = [
            [7680, 4320],
            [5120, 3200],
            [5120, 2880],
            [5120, 2700],
            [5120, 2160],
            [3840, 2160],
            [3840, 1600],
            [2560, 1440],
            [2560, 1080],
            [1920, 1080],
            [1920, 1200],
            [1600, 900],
            [1280, 720],
            [1024, 768],
            [960, 540],
            [800, 600],
            [640, 480],
            [640, 360],
            [320, 240]
        ];
        const STANDARD_CAMERA_FPS = [120, 90, 72, 60, 50, 48, 30, 25, 24, 20, 15, 10, 5];

        function buildResolutionChoices(caps) {
            if (!caps || caps.width == null || caps.height == null) {
                return [];
            }
            const wMin = caps.width.min != null ? caps.width.min : 1;
            const wMax = caps.width.max != null ? caps.width.max : 1920;
            const hMin = caps.height.min != null ? caps.height.min : 1;
            const hMax = caps.height.max != null ? caps.height.max : 1080;
            const out = [];
            for (const [w, h] of STANDARD_CAMERA_RESOLUTIONS) {
                if (w >= wMin && w <= wMax && h >= hMin && h <= hMax) {
                    out.push({ w, h });
                }
            }
            const maxW = Math.floor(wMax);
            const maxH = Math.floor(hMax);
            if (maxW >= wMin && maxH >= hMin && !out.some((p) => p.w === maxW && p.h === maxH)) {
                out.unshift({ w: maxW, h: maxH });
            }
            out.sort((a, b) => b.w * b.h - a.w * a.h);
            if (out.length === 0 && maxW > 0 && maxH > 0) {
                out.push({ w: maxW, h: maxH });
            }
            return out;
        }

        /** WebM/VP9 bitrate scales with resolution (5K+ needs much more than 1080p). */
        function pickVideoBitrateForResolution(w, h) {
            const pixels =
                Math.max(1, Math.floor(w || 0)) * Math.max(1, Math.floor(h || 0));
            if (pixels <= 920000) return 5_000_000;
            if (pixels <= 2100000) return 8_000_000;
            if (pixels <= 3800000) return 12_000_000;
            if (pixels <= 8500000) return 28_000_000;
            if (pixels <= 16_500_000) return 42_000_000;
            return 55_000_000;
        }

        function formatFpsLabel(f) {
            if (Number.isInteger(f)) return String(f);
            const r = Math.round(f * 100) / 100;
            return String(r);
        }

        function buildFpsChoices(caps) {
            if (!caps || caps.frameRate == null) {
                return [30];
            }
            const fMin = caps.frameRate.min != null ? caps.frameRate.min : 1;
            const fMax = caps.frameRate.max != null ? caps.frameRate.max : 30;
            const out = STANDARD_CAMERA_FPS.filter((f) => f >= fMin - 0.02 && f <= fMax + 0.02);
            const nearMax = Math.min(fMax, Math.floor(fMax * 100) / 100);
            if (nearMax >= fMin && !out.some((f) => Math.abs(f - fMax) < 0.75)) {
                out.unshift(nearMax);
            }
            const seen = new Set();
            const uniq = [];
            for (const f of out.sort((a, b) => b - a)) {
                const k = formatFpsLabel(f);
                if (!seen.has(k)) {
                    seen.add(k);
                    uniq.push(f);
                }
            }
            return uniq.length ? uniq : [Math.min(30, fMax)];
        }

        function updateCameraConstraintControlsState() {
            const lock = cameraRecordingActive || timelapseCapturing;
            if (cameraResolutionSelect) {
                cameraResolutionSelect.disabled = lock || cameraList.length === 0;
            }
            if (cameraFpsSelect) {
                cameraFpsSelect.disabled = lock || cameraList.length === 0;
            }
        }

        function waitForVideoFrameDimensions(videoEl, timeoutMs = 15000) {
            return new Promise((resolve, reject) => {
                function ok() {
                    return videoEl && videoEl.videoWidth > 0 && videoEl.videoHeight > 0;
                }
                if (ok()) {
                    resolve();
                    return;
                }
                const t = setTimeout(() => {
                    cleanup();
                    reject(new Error('Video dimensions timeout'));
                }, timeoutMs);
                function tryResolve() {
                    if (ok()) {
                        cleanup();
                        resolve();
                    }
                }
                function cleanup() {
                    clearTimeout(t);
                    videoEl.removeEventListener('loadedmetadata', tryResolve);
                    videoEl.removeEventListener('loadeddata', tryResolve);
                    videoEl.removeEventListener('resize', tryResolve);
                }
                videoEl.addEventListener('loadedmetadata', tryResolve);
                videoEl.addEventListener('loadeddata', tryResolve);
                videoEl.addEventListener('resize', tryResolve);
            });
        }

        function revealPreviewRow() {
            if (previewRow) previewRow.classList.remove('preview-row--awaiting-camera');
            if (videoDigitalZoom) videoDigitalZoom.style.visibility = '';
        }

        /** Populate resolution / FPS UI from an already-open video track (no extra getUserMedia). */
        function fillCameraControlsFromTrack(videoTrack, opts = {}) {
            if (!videoTrack || !cameraResolutionSelect || !cameraFpsSelect) return;

            const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
            window.cameraCapabilities = caps;

            const forceHighest = opts.defaultToHighestResAndFps === true;
            const prevRes = forceHighest ? '' : cameraResolutionSelect.value;
            const prevFps = forceHighest ? '' : cameraFpsSelect.value;

            cameraResolutionSelect.innerHTML = '';
            const resChoices = buildResolutionChoices(caps);
            if (resChoices.length === 0) {
                const o = document.createElement('option');
                o.value = '';
                o.textContent = t('resolutionDefault');
                cameraResolutionSelect.appendChild(o);
            } else {
                for (const { w, h } of resChoices) {
                    const o = document.createElement('option');
                    o.value = `${w}x${h}`;
                    o.textContent = `${w} × ${h}`;
                    cameraResolutionSelect.appendChild(o);
                }
                const keys = new Set(
                    Array.from(cameraResolutionSelect.options).map((opt) => opt.value)
                );
                if (prevRes && keys.has(prevRes)) {
                    cameraResolutionSelect.value = prevRes;
                } else {
                    /* buildResolutionChoices sorts by pixel count descending — first = highest supported. */
                    cameraResolutionSelect.selectedIndex = 0;
                }
            }

            cameraFpsSelect.innerHTML = '';
            const fpsChoices = buildFpsChoices(caps);
            for (const f of fpsChoices) {
                const o = document.createElement('option');
                const fv = formatFpsLabel(f);
                o.value = fv;
                o.textContent = `${fv} fps`;
                cameraFpsSelect.appendChild(o);
            }
            const fpsVals = new Set(Array.from(cameraFpsSelect.options).map((opt) => opt.value));
            if (prevFps && fpsVals.has(prevFps)) {
                cameraFpsSelect.value = prevFps;
            } else if (cameraFpsSelect.options.length > 0) {
                /* buildFpsChoices lists highest frame rate first. */
                cameraFpsSelect.selectedIndex = 0;
            }

            updateCameraConstraintControlsState();
        }

        function setCameraControlsFallbackDefaults() {
            window.cameraCapabilities = null;
            if (!cameraResolutionSelect || !cameraFpsSelect) return;
            cameraResolutionSelect.innerHTML = '';
            const ro = document.createElement('option');
            ro.value = '';
            ro.textContent = t('resolutionDefault');
            cameraResolutionSelect.appendChild(ro);
            cameraFpsSelect.innerHTML = '';
            const fo = document.createElement('option');
            fo.value = '30';
            fo.textContent = '30 fps';
            cameraFpsSelect.appendChild(fo);
            updateCameraConstraintControlsState();
        }

        function getVideoConstraintsFromControls(deviceId) {
            const caps = window.cameraCapabilities;
            const videoConstraints = {};
            if (deviceId && String(deviceId).length > 0) {
                videoConstraints.deviceId = { exact: deviceId };
            }

            const resVal = cameraResolutionSelect && cameraResolutionSelect.value;
            if (resVal && resVal.includes('x')) {
                const parts = resVal.toLowerCase().split('x');
                const w = parseInt(parts[0], 10);
                const h = parseInt(parts[1], 10);
                if (Number.isFinite(w) && Number.isFinite(h)) {
                    videoConstraints.width = { ideal: w };
                    videoConstraints.height = { ideal: h };
                }
            } else if (caps && caps.width && caps.height) {
                videoConstraints.width = { ideal: caps.width.max };
                videoConstraints.height = { ideal: caps.height.max };
            }

            const fpsVal = cameraFpsSelect && cameraFpsSelect.value;
            const fps = fpsVal ? parseFloat(fpsVal) : NaN;
            if (Number.isFinite(fps)) {
                if (caps && caps.frameRate && caps.frameRate.max != null) {
                    videoConstraints.frameRate = {
                        ideal: fps,
                        max: caps.frameRate.max
                    };
                } else {
                    videoConstraints.frameRate = { ideal: fps };
                }
            }

            if (!(resVal && resVal.includes('x')) && caps && caps.aspectRatio) {
                videoConstraints.aspectRatio = { ideal: caps.aspectRatio.max };
            }

            return videoConstraints;
        }

        async function restartCameraPreviewForConstraints() {
            if (!currentCameraDeviceId) return;
            if (cameraRecordingActive || timelapseCapturing) return;
            await startCamera(currentCameraDeviceId);
        }

        /** Same negotiation as changing resolution: reopen with getVideoConstraintsFromControls (not device-only). */
        async function refineCameraStreamToMatchControls() {
            if (!currentCameraDeviceId || cameraRecordingActive || timelapseCapturing) return;
            if (!currentStream) return;
            try {
                await startCamera(currentCameraDeviceId);
            } catch (e) {
                console.warn('Refine camera stream to match controls failed:', e);
                const id = currentCameraDeviceId;
                if (id) {
                    try {
                        await startCamera(id, { preferMinimalVideo: true });
                    } catch (e2) {
                        console.warn('Camera minimal reopen failed:', e2);
                    }
                }
            }
        }

        // Lock other recording buttons while one mode is active.

        const recordingTypeButtons = [
            recordButton,
            toggleScreenRecordingButton,

        let activeRecordingType = null;

        function setRecordingLock(activeButton) {

        let currentStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let screenStream = null;
        let suppressAudioDownload = false;
        let audioRecorder = null;
        let audioChunks = [];
        let audioRecordStream = null;
        let screenMediaRecorder = null;
        let screenRecordedChunks = [];
        let streamCaptureRecorder = null;
        let streamCaptureChunks = [];
        let pipVideo = null;

        let timelapseFrames = [];

        let timelapseRecordClockTimer = null;

        let timelapseSessionCache = {

        };

        // Camera-recording pipeline (canvas for mirroring + WebAudio gain for mute).
        let cameraRecordingCanvas = null;
        let cameraRecordingCtx = null;
        let cameraCanvasStream = null;
        let cameraDrawRequestId = null;
        let cameraRecordingActive = false;
        let cameraAudioContext = null;
        let cameraAudioGainNode = null;
        let cameraAudioSourceNode = null;

        // Screen/stream recording pipeline (canvas mirroring + gain-based muting).
        let screenRecordingCanvas = null;
        let screenRecordingCtx = null;
        let screenCanvasStream = null;
        let screenDrawRequestId = null;
        let screenRecordingActive = false;
        let screenAudioContext = null;

        let cameraList = [];

        let mirrorFeed = false;
        let isMutedVideoAudio = false;

        async function refreshMediaDeviceLists() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                cameraList = devices.filter((d) => d.kind === 'videoinput');
                microphoneList = devices.filter((d) => d.kind === 'audioinput');
            } catch (e) {
                console.warn('refreshMediaDeviceLists:', e);
            }
        }

        let cameraAutoReconnectInFlight = false;

        async function handleCameraDisconnected(endedVideoTrack) {
            if (cameraAutoReconnectInFlight) return;
            cameraAutoReconnectInFlight = true;
            try {
                const lostId =
                    (endedVideoTrack &&
                        endedVideoTrack.getSettings &&
                        endedVideoTrack.getSettings().deviceId) ||
                    currentCameraDeviceId;

                await refreshMediaDeviceLists();
                const inputs = cameraList.filter((d) => d.deviceId && String(d.deviceId).length > 0);
                if (inputs.length === 0) {
                    console.warn('Camera disconnected; no video inputs available.');
                    return;
                }

                const others = inputs.filter((d) => d.deviceId !== lostId);
                const tryOrder = others.length > 0 ? others : inputs;

                for (const cand of tryOrder) {
                    currentCameraDeviceId = cand.deviceId;
                    const idx = cameraList.findIndex((d) => d.deviceId === cand.deviceId);
                    if (idx >= 0) currentCameraIndex = idx;
                    await startCamera(cand.deviceId, {
                        preferMinimalVideo: true,
                        defaultToHighestResAndFps: true
                    });
                    if (currentStream) break;
                }

                if (!currentStream) {
                    await startCamera('', {
                        preferMinimalVideo: true,
                        defaultToHighestResAndFps: true
                    });
                }

                if (currentStream) {
                    await refineCameraStreamToMatchControls();
                }

                await refreshMediaDeviceLists();
                const track = currentStream && currentStream.getVideoTracks()[0];
                const st = track && track.getSettings ? track.getSettings() : {};
                if (st.deviceId) {
                    currentCameraDeviceId = st.deviceId;
                    const syncIdx = cameraList.findIndex((d) => d.deviceId === st.deviceId);
                    if (syncIdx >= 0) currentCameraIndex = syncIdx;
                }
            } catch (e) {
                console.warn('handleCameraDisconnected:', e);
            } finally {
                cameraAutoReconnectInFlight = false;
            }
        }

        function updateMirrorToggleUI() {
            // Only mirror the word; keep the button clickable and stable.
            mirrorToggleText.style.display = 'inline-block';
            mirrorToggleText.style.transform = mirrorFeed ? 'scaleX(-1)' : 'scaleX(1)';
            mirrorToggleButton.classList.toggle('mirrored', mirrorFeed);
        }

        function updateMuteToggleUI() {
            muteToggleText.textContent = isMutedVideoAudio ? t('micOff') : t('micOn');
            muteToggleButton.classList.toggle('muted', isMutedVideoAudio);
            muteToggleButton.setAttribute('aria-pressed', isMutedVideoAudio ? 'true' : 'false');

        function getTimestamp() {
            const now = new Date();
            const year = String(now.getFullYear()).slice(2); // Last 2 digits of the year
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}${month}${day}${hours}${minutes}-`;
        }

        async function initializeDevices() {
            try {
                await refreshMediaDeviceLists();

                /* Until permission is granted, deviceId is often blank and entries are unreliable. */
                if (
                    cameraList.length > 0 &&
                    cameraList.every((d) => !d.deviceId || String(d.deviceId).length === 0)
                ) {
                    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    tmp.getTracks().forEach((t) => t.stop());
                    await refreshMediaDeviceLists();
                }

                if (cameraList.length > 0) {
                    const deviceId = cameraList[0].deviceId;
                    currentCameraDeviceId = deviceId;
                    currentCameraIndex = 0;
                    await startCamera(deviceId, { preferMinimalVideo: true });
                    await refineCameraStreamToMatchControls();
                    if (currentStream && video) {
                        try {
                            await waitForVideoFrameDimensions(video);
                        } catch (e) {
                            console.warn('Preview ready wait:', e);
                        }
                        await new Promise((resolve) => {
                            requestAnimationFrame(() => {
                                requestAnimationFrame(resolve);
                            });
                        });
                    }
                    await refreshMediaDeviceLists();
                    const track = currentStream && currentStream.getVideoTracks()[0];
                    const st = track && track.getSettings ? track.getSettings() : {};
                    if (st.deviceId) {
                        currentCameraDeviceId = st.deviceId;
                    }
                    const idx = cameraList.findIndex((d) => d.deviceId === currentCameraDeviceId);
                    if (idx >= 0) {
                        currentCameraIndex = idx;
                    }
                } else {
                    console.log("No cameras found.");
                    if (cameraResolutionSelect) cameraResolutionSelect.innerHTML = '';
                    if (cameraFpsSelect) cameraFpsSelect.innerHTML = '';
                }

                if (microphoneList.length > 0) {
                    currentMicDeviceId = microphoneList[0].deviceId;
                } else {
                    console.log("No microphones found.");
                }
                updateCameraConstraintControlsState();
            } catch (err) {
                console.error("Error initializing devices: " + err);
            } finally {
                revealPreviewRow();
            }
        }

        async function startCamera(deviceId, options = {}) {
            let preferMinimalVideo = options.preferMinimalVideo === true;
            const defaultToHighestResAndFps = options.defaultToHighestResAndFps === true;
            try {
                const audioConstraints = currentMicDeviceId
                    ? {
                          deviceId: currentMicDeviceId,
                          echoCancellation: true,
                          noiseSuppression: true,
                          autoGainControl: true,
                          sampleRate: 48000,
                          sampleSize: 16
                      }
                    : true;

                let videoConstraints;
                if (preferMinimalVideo) {
                    videoConstraints =
                        deviceId && String(deviceId).length > 0
                            ? { deviceId: { exact: deviceId } }
                            : true;
                } else {
                    videoConstraints = getVideoConstraintsFromControls(deviceId);
                    if (!videoConstraints || Object.keys(videoConstraints).length === 0) {
                        videoConstraints = true;
                    }
                }

                const constraints = {
                    video: videoConstraints,
                    audio: audioConstraints
                };

                if (currentStream) {
                    currentStream.getTracks().forEach((track) => track.stop());
                    currentStream = null;
                }
                try {
                    if (video) video.srcObject = null;
                } catch (e) {}

                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    if (!preferMinimalVideo && deviceId && String(deviceId).length > 0) {
                        console.warn('Camera open failed with full constraints, retrying device-only:', err);
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { deviceId: { exact: deviceId } },
                            audio: audioConstraints
                        });
                        preferMinimalVideo = true;
                    } else {
                        throw err;
                    }
                }

                currentStream = stream;

                const videoTrack = currentStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.addEventListener(
                        'ended',
                        () => {
                            void handleCameraDisconnected(videoTrack);
                        },
                        { once: true }
                    );
                }
                if (preferMinimalVideo) {
                    fillCameraControlsFromTrack(videoTrack, {
                        defaultToHighestResAndFps
                    });
                } else if (videoTrack && videoTrack.getCapabilities) {
                    window.cameraCapabilities = videoTrack.getCapabilities();
                }

                const settings = videoTrack.getSettings();
                console.log('Active camera settings:', settings);

                updateDeviceInfo(settings);

                video.srcObject = currentStream;
                updateMirroring();

                video.setAttribute('playsinline', true);
                video.setAttribute('controls', false);

                updateZoomUI();
                updateCameraConstraintControlsState();
            } catch (err) {
                console.error('Error starting camera: ' + err);
                setCameraControlsFallbackDefaults();
            }
        }

        function updateMirroring() {
            video.style.transform = mirrorFeed ? 'scaleX(-1)' : 'scaleX(1)';
        }

        function applyDigitalZoomFromSlider() {
            if (!videoDigitalZoom || !zoomSlider) return;
            let z = parseFloat(zoomSlider.value);
            if (Number.isNaN(z)) z = 1;
            z = Math.min(10, Math.max(1, z));
            videoDigitalZoom.style.transform = `scale(${z})`;
            if (zoomValueLabel) {
                zoomValueLabel.textContent = (Math.round(z * 10) / 10).toString().replace(/\.0$/, '') + '×';
            }
        }

        function updateZoomUI() {
            if (!zoomSlider) return;
            zoomSlider.min = '1';
            zoomSlider.max = '10';
            zoomSlider.step = '0.1';
            zoomSlider.value = '1';
            applyDigitalZoomFromSlider();
        }

        function getDigitalZoomFactor() {
            if (!zoomSlider) return 1;
            const z = parseFloat(zoomSlider.value);
            if (Number.isNaN(z)) return 1;
            return Math.min(10, Math.max(1, z));
        }

        /** Center rectangle in full frame that matches the digital zoom slider (same as CSS scale). */
        function getDigitalZoomSourceRect(vw, vh) {
            const z = getDigitalZoomFactor();
            const sw = vw / z;
            const sh = vh / z;
            return { sx: (vw - sw) / 2, sy: (vh - sh) / 2, sw, sh };
        }

        /** Center-crop to match CSS digital zoom, then scale to dest (recording / photo / timelapse). */
        function drawVideoWithDigitalZoom(ctx, destW, destH) {
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (!vw || !vh || destW < 1 || destH < 1) return;
            const { sx, sy, sw, sh } = getDigitalZoomSourceRect(vw, vh);
            if (mirrorFeed) {
                ctx.save();
                ctx.translate(destW, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, sx, sy, sw, sh, 0, 0, destW, destH);
                ctx.restore();
            } else {
                ctx.drawImage(video, sx, sy, sw, sh, 0, 0, destW, destH);
            }
        }

        async function replaceAudioTrackInCurrentStream(deviceId) {
            if (!currentStream) return;
            try {
                // Stop and remove old audio tracks only (keep the video stream).
                currentStream.getAudioTracks().forEach(track => {
                    currentStream.removeTrack(track);
                    track.stop();
                });

                const audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        deviceId: deviceId,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000,
                        sampleSize: 16
                    }
                });

                audioStream.getAudioTracks().forEach(track => {
                    currentStream.addTrack(track);
                });

                // Keep the video element bound to the updated stream.
                video.srcObject = currentStream;
                updateDeviceInfo();
                updateMirroring();
            } catch (err) {
                console.error("Error replacing audio track: " + err);
            }
        }

        function updateDeviceInfo(settings = null) {
            if (cameraList.length > 0) {
                let cameraText = t('prefixCamera', {
                    label: cameraList[currentCameraIndex].label || t('unknownDevice')
                });
                if (settings) {
                    cameraText += '\n' + t('deviceLineResolution', { w: settings.width, h: settings.height });
                    cameraText += '\n' + t('deviceLineFps', { rate: settings.frameRate });
                }
                cameraInfo.textContent = cameraText;
            } else {
                cameraInfo.textContent = t('cameraNone');
            }

            if (microphoneList.length > 0) {
                micInfo.textContent = t('micWithLabel', {
                    label: microphoneList[currentMicIndex].label || t('unknownDevice')
                });
            } else {
                micInfo.textContent = t('micNone');
            }
        }

        async function startRecording() {
            try {
                if (!currentStream) {
                    throw new Error(t('errNoCameraStream'));
                }

                // If we somehow have stale artifacts from an earlier attempt, remove them.
                cleanupCameraRecordingArtifacts();

                // Canvas mirroring: encode frames from a canvas so Mirror updates immediately in the recorded output.
                const videoTrack = currentStream.getVideoTracks()[0];
                const settings = (videoTrack && videoTrack.getSettings) ? videoTrack.getSettings() : {};
                const w = Math.max(1, Math.floor(settings.width || video.videoWidth || 1280));
                const h = Math.max(1, Math.floor(settings.height || video.videoHeight || 720));

                cameraRecordingCanvas = document.createElement('canvas');
                cameraRecordingCanvas.width = w;
                cameraRecordingCanvas.height = h;
                cameraRecordingCtx = cameraRecordingCanvas.getContext('2d');

                const fps = 30;
                cameraCanvasStream = cameraRecordingCanvas.captureStream(fps);
                const canvasVideoTrack = cameraCanvasStream.getVideoTracks()[0];

                // Audio muting without restarting (camera mode): route audio through a GainNode.
                let composedStreamTracks = [canvasVideoTrack];

                const audioTracks = currentStream.getAudioTracks ? currentStream.getAudioTracks() : [];
                if (audioTracks && audioTracks.length > 0) {
                    cameraAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    cameraAudioGainNode = cameraAudioContext.createGain();
                    cameraAudioGainNode.gain.value = isMutedVideoAudio ? 0 : 1;

                    const audioOnlyStream = new MediaStream(audioTracks);
                    cameraAudioSourceNode = cameraAudioContext.createMediaStreamSource(audioOnlyStream);
                    cameraAudioDest = cameraAudioContext.createMediaStreamDestination();

                    cameraAudioSourceNode.connect(cameraAudioGainNode);
                    cameraAudioGainNode.connect(cameraAudioDest);

                    composedStreamTracks = [
                        canvasVideoTrack,
                        ...cameraAudioDest.stream.getAudioTracks()
                    ];
                }

                const composedStream = new MediaStream(composedStreamTracks);

                const options = {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: pickVideoBitrateForResolution(w, h),
                    audioBitsPerSecond: 128000
                };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'video/webm;codecs=vp8,opus';
                }

                mediaRecorder = new MediaRecorder(composedStream, options);
                recordedChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = getTimestamp() + 'video.webm';
                    document.body.appendChild(a);
                    a.click();
                    URL.revokeObjectURL(url);

                    cleanupCameraRecordingArtifacts();
                };

                mediaRecorder.start();
                cameraRecordingActive = true;
                updateCameraConstraintControlsState();
                
                const drawFrame = () => {
                    if (!cameraRecordingActive || !cameraRecordingCtx) return;
                    cameraRecordingCtx.clearRect(0, 0, w, h);
                    drawVideoWithDigitalZoom(cameraRecordingCtx, w, h);
                    cameraDrawRequestId = requestAnimationFrame(drawFrame);
                };

                cameraDrawRequestId = requestAnimationFrame(drawFrame);

                recordButton.textContent = t('btnStopRecord');
                recordButton.classList.add('recording');
                if (recordingStatus) recordingStatus.textContent = t('statusCameraStarted');
                recordButton.setAttribute('aria-pressed', 'true');
                activeRecordingType = 'camera';
                setRecordingLock(recordButton);
            } catch (err) {
                console.error("Error starting recording: " + err);
                cleanupCameraRecordingArtifacts();
            }
        }

            if (cameraDrawRequestId) {

            recordButton.textContent = t('btnStartRecord');
            recordButton.classList.remove('recording');

            recordButton.setAttribute('aria-pressed', 'false');

        function cleanupCameraRecordingArtifacts() {
            try {
                cameraRecordingActive = false;
                if (cameraDrawRequestId) {
                    cancelAnimationFrame(cameraDrawRequestId);
                    cameraDrawRequestId = null;
                }
            } catch (e) {}

            try {
                if (cameraCanvasStream) {
                    cameraCanvasStream.getTracks().forEach(track => track.stop());
                }
            } catch (e) {}

            cameraCanvasStream = null;
            cameraRecordingCtx = null;
            cameraRecordingCanvas = null;

            try {
                if (cameraAudioGainNode) {
                    cameraAudioGainNode.disconnect();
                }
                if (cameraAudioSourceNode) {
                    cameraAudioSourceNode.disconnect();
                }
            } catch (e) {}
            try {
                if (cameraAudioDest) {
                    cameraAudioDest.disconnect && cameraAudioDest.disconnect();
                }
            } catch (e) {}
            try {
                if (cameraAudioContext && cameraAudioContext.state !== 'closed') {
                    cameraAudioContext.close();
                }
            } catch (e) {}

            cameraAudioContext = null;
            cameraAudioGainNode = null;
            cameraAudioSourceNode = null;
            cameraAudioDest = null;
            updateCameraConstraintControlsState();
        }

        function createIsolatedContainer(targetRect = null) {
            // Create an iframe to isolate the video.
            // If targetRect is provided, we render the preview into the same
            // viewport area as the camera video to avoid full-screen stacking.
            const iframe = document.createElement('iframe');
            const top = targetRect ? `${targetRect.top}px` : '0';
            const left = targetRect ? `${targetRect.left}px` : '0';
            const width = targetRect ? `${targetRect.width}px` : '100%';
            const height = targetRect ? `${targetRect.height}px` : '100%';

            iframe.style.cssText = `
                position: fixed;
                top: ${top};

                width: ${width};
                height: ${height};
                border: none;
                z-index: 999999;
                background: transparent;

            document.body.appendChild(iframe);

        function setupNotificationHider() {
            // Previous mutation observer code
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === Node.ELEMENT_NODE) {
                                hideElement(node);
                                // Also check shadow DOM
                                if (node.shadowRoot) {
                                    hideElement(node.shadowRoot);
                                    const shadowObserver = new MutationObserver((shadowMutations) => {
                                        shadowMutations.forEach(m => {
                                            m.addedNodes.forEach(n => hideElement(n));
                                        });
                                    });
                                    shadowObserver.observe(node.shadowRoot, {
                                        childList: true,
                                        subtree: true,
                                        attributes: true
                                    });
                                }
                            }
                        });
                    }
                });
            });

            // Observe both document and any shadow roots
            observer.observe(document.documentElement, {
                childList: true,
                subtree: true,
                attributes: true
            });

            // Also try to find and observe any existing shadow roots
            document.querySelectorAll('*').forEach(el => {
                if (el.shadowRoot) {
                    observer.observe(el.shadowRoot, {
                        childList: true,
                        subtree: true,
                        attributes: true
                    });
                }
            });

            return observer;

                // Try multiple ways to remove/hide the element

        async function startScreenRecording() {
