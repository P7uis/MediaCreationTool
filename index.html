        /** Chrome/Android often omits USB / external videoinput until built-in facing modes (and sometimes a generic stream) are opened once. */
        let lastAndroidExternalCamProbeAt = 0;
        let androidSessionSwitchProbeDone = false;

        async function runAndroidExternalCameraEnumerationProbes(reason) {
            if (!/Android/i.test(navigator.userAgent || '')) return;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

            const now = Date.now();
            const skipThrottle = reason === 'preOpen' || reason === 'switch';
            const throttleMs = skipThrottle ? 0 : 8000;
            if (throttleMs > 0 && now - lastAndroidExternalCamProbeAt < throttleMs) return;
            lastAndroidExternalCamProbeAt = now;

            const tryShortCapture = async (videoConstraints) => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({
                        video: videoConstraints,
                        audio: false
                    });
                    s.getTracks().forEach((t) => t.stop());
                } catch (e) {
                    /* Missing facing mode or busy hardware — ignore */
                }
            };

            await tryShortCapture({ facingMode: { ideal: 'user' } });
            await refreshMediaDeviceLists();

            await tryShortCapture({ facingMode: { ideal: 'environment' } });
            await refreshMediaDeviceLists();

            await tryShortCapture(true);
            await refreshMediaDeviceLists();
        }

        let cameraAutoReconnectInFlight = false;

        async function handleCameraDisconnected(endedVideoTrack) {
            if (cameraAutoReconnectInFlight) return;
            cameraAutoReconnectInFlight = true;
            try {
                const lostId =
                    (endedVideoTrack &&
                        endedVideoTrack.getSettings &&
                        endedVideoTrack.getSettings().deviceId) ||
                    currentCameraDeviceId;

                await refreshMediaDeviceLists();
                const inputs = cameraList.filter((d) => d.deviceId && String(d.deviceId).length > 0);
                if (inputs.length === 0) {
                    console.warn('Camera disconnected; no video inputs available.');
                    return;
                }

                const others = inputs.filter((d) => d.deviceId !== lostId);
                const tryOrder = others.length > 0 ? others : inputs;

                for (const cand of tryOrder) {
                    currentCameraDeviceId = cand.deviceId;
                    const idx = cameraList.findIndex((d) => d.deviceId === cand.deviceId);
                    if (idx >= 0) currentCameraIndex = idx;
                    await startCamera(cand.deviceId, {
                        preferMinimalVideo: true,
                        defaultToHighestResAndFps: true
                    });
                    if (currentStream) break;
                }

                if (!currentStream) {
                    await startCamera('', {
                        preferMinimalVideo: true,
                        defaultToHighestResAndFps: true
                    });
                }

                if (currentStream) {
                    await refineCameraStreamToMatchControls();
                }

                await refreshMediaDeviceLists();
                const track = currentStream && currentStream.getVideoTracks()[0];
                const st = track && track.getSettings ? track.getSettings() : {};
                if (st.deviceId) {
                    currentCameraDeviceId = st.deviceId;
                    const syncIdx = cameraList.findIndex((d) => d.deviceId === st.deviceId);
                    if (syncIdx >= 0) currentCameraIndex = syncIdx;
                }
            } catch (e) {
                console.warn('handleCameraDisconnected:', e);
            } finally {
                cameraAutoReconnectInFlight = false;
            }
        }

        function updateMirrorToggleUI() {
            // Only mirror the word; keep the button clickable and stable.
            mirrorToggleText.style.display = 'inline-block';
            mirrorToggleText.style.transform = mirrorFeed ? 'scaleX(-1)' : 'scaleX(1)';
            mirrorToggleButton.classList.toggle('mirrored', mirrorFeed);
        }

        function updateMuteToggleUI() {
            muteToggleText.textContent = isMutedVideoAudio ? t('micOff') : t('micOn');
            muteToggleButton.classList.toggle('muted', isMutedVideoAudio);
            muteToggleButton.setAttribute('aria-pressed', isMutedVideoAudio ? 'true' : 'false');
        }

        function getTimestamp() {
            const now = new Date();
            const year = String(now.getFullYear()).slice(2); // Last 2 digits of the year
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}${month}${day}${hours}${minutes}-`;
        }

        async function initializeDevices() {
            try {
                await refreshMediaDeviceLists();

                /* Until permission is granted, deviceId is often blank and entries are unreliable. */
                if (
                    cameraList.length > 0 &&
                    cameraList.every((d) => !d.deviceId || String(d.deviceId).length === 0)
                ) {
                    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    tmp.getTracks().forEach((t) => t.stop());
                    await refreshMediaDeviceLists();
                }

                if (cameraList.length > 0) {
                    if (
                        /Android/i.test(navigator.userAgent || '') &&
                        cameraList.length <= ANDROID_ENUM_PROBE_MAX_CAMERAS
                    ) {
                        await runAndroidExternalCameraEnumerationProbes('preOpen');
                        await refreshMediaDeviceLists();
                    }
                    const deviceId = cameraList[0].deviceId;
                    currentCameraDeviceId = deviceId;
                    currentCameraIndex = 0;
                    await startCamera(deviceId, { preferMinimalVideo: true });
                    await refineCameraStreamToMatchControls();
                    if (currentStream && video) {
                        try {
                            await waitForVideoFrameDimensions(video);
                        } catch (e) {
                            console.warn('Preview ready wait:', e);
                        }
                        await new Promise((resolve) => {
                            requestAnimationFrame(() => {
                                requestAnimationFrame(resolve);
                            });
                        });
                    }
                    await refreshMediaDeviceLists();
                    const track = currentStream && currentStream.getVideoTracks()[0];
                    const st = track && track.getSettings ? track.getSettings() : {};
                    if (st.deviceId) {
                        currentCameraDeviceId = st.deviceId;
                    }
                    const idx = cameraList.findIndex((d) => d.deviceId === currentCameraDeviceId);
                    if (idx >= 0) {
                        currentCameraIndex = idx;
                    }
                    updateDeviceInfo(st);
                } else {
                    console.log("No cameras found.");
                    if (cameraResolutionSelect) cameraResolutionSelect.innerHTML = '';
                    if (cameraFpsSelect) cameraFpsSelect.innerHTML = '';
                }

                if (microphoneList.length > 0) {
                    currentMicDeviceId = microphoneList[0].deviceId;
                } else {
                    console.log("No microphones found.");
                }
                updateCameraConstraintControlsState();
                applyStopMotionAuxiliaryLocks();
            } catch (err) {
                console.error("Error initializing devices: " + err);
            } finally {
                revealPreviewRow();
            }
        }

        async function startCamera(deviceId, options = {}) {
            let preferMinimalVideo = options.preferMinimalVideo === true;
            const defaultToHighestResAndFps = options.defaultToHighestResAndFps === true;
            try {
                const audioConstraints = currentMicDeviceId
                    ? {
                          deviceId: currentMicDeviceId,
                          echoCancellation: true,
                          noiseSuppression: true,
                          autoGainControl: true,
                          sampleRate: 48000,
                          sampleSize: 16
                      }
                    : true;

                let videoConstraints;
                if (preferMinimalVideo) {
                    videoConstraints =
                        deviceId && String(deviceId).length > 0
                            ? { deviceId: { exact: deviceId } }
                            : true;
                } else {
                    videoConstraints = getVideoConstraintsFromControls(deviceId);
                    if (!videoConstraints || Object.keys(videoConstraints).length === 0) {
                        videoConstraints = true;
                    }
                }

                const constraints = {
                    video: videoConstraints,
                    audio: audioConstraints
                };

                if (currentStream) {
                    currentStream.getTracks().forEach((track) => track.stop());
                    currentStream = null;
                }
                try {
                    if (video) video.srcObject = null;
                } catch (e) {}

                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    if (!preferMinimalVideo && deviceId && String(deviceId).length > 0) {
                        console.warn('Camera open failed with full constraints, retrying device-only:', err);
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { deviceId: { exact: deviceId } },
                            audio: audioConstraints
                        });
                        preferMinimalVideo = true;
                    } else {
                        throw err;
                    }
                }

                currentStream = stream;

                const videoTrack = currentStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.addEventListener(
                        'ended',
                        () => {
                            void handleCameraDisconnected(videoTrack);
                        },
                        { once: true }
                    );
                }
                if (preferMinimalVideo) {
                    fillCameraControlsFromTrack(videoTrack, {
                        defaultToHighestResAndFps
                    });
                } else if (videoTrack && videoTrack.getCapabilities) {
                    window.cameraCapabilities = videoTrack.getCapabilities();
                }

                const settings = videoTrack.getSettings();
                console.log('Active camera settings:', settings);

                updateDeviceInfo(settings);

                video.srcObject = currentStream;
                updateMirroring();

                video.setAttribute('playsinline', true);
                video.setAttribute('controls', false);

                updateZoomUI();
                updateCameraConstraintControlsState();
                applyStopMotionAuxiliaryLocks();
            } catch (err) {
                console.error('Error starting camera: ' + err);
                setCameraControlsFallbackDefaults();
                applyStopMotionAuxiliaryLocks();
            }
        }

        function updateMirroring() {
            video.style.transform = mirrorFeed ? 'scaleX(-1)' : 'scaleX(1)';
            void refreshStopMotionOverlayPreview();
        }

        function syncStopMotionOverlayToggleVisual() {
            if (!stopMotionOverlayToggle) return;
            stopMotionOverlayToggle.setAttribute('aria-pressed', stopMotionLastFrameOverlayEnabled ? 'true' : 'false');
            stopMotionOverlayToggle.classList.toggle('sm-lastframe-toggle--on', stopMotionLastFrameOverlayEnabled);
        }

        function syncStopMotionOverlayOpacityGroupVisibility() {
            if (!stopMotionOverlayOpacityGroup) return;
            const show = !!stopMotionLastFrameOverlayEnabled;
            stopMotionOverlayOpacityGroup.hidden = !show;
            stopMotionOverlayOpacityGroup.setAttribute('aria-hidden', show ? 'false' : 'true');
            if (stopMotionOverlayOpacitySlider) {
                stopMotionOverlayOpacitySlider.disabled = !show || stopMotionEncoding;
                stopMotionOverlayOpacitySlider.tabIndex = show ? 0 : -1;
            }
        }

        async function refreshStopMotionOverlayPreview() {
            if (!stopMotionOverlayImg) return;
            if (stopMotionOverlayObjectUrl) {
                try {
                    URL.revokeObjectURL(stopMotionOverlayObjectUrl);
                } catch (e) {}
                stopMotionOverlayObjectUrl = null;
            }
            stopMotionOverlayImg.removeAttribute('src');
            stopMotionOverlayImg.hidden = true;
            if (
                !stopMotionLastFrameOverlayEnabled ||
                !stopMotionFrameStore ||
                getStopMotionFrameCount() === 0
            ) {
                syncStopMotionOverlayOpacityGroupVisibility();
                return;
            }
            try {
                await stopMotionFrameStore.flush();
                if (!stopMotionLastFrameOverlayEnabled) {
                    syncStopMotionOverlayOpacityGroupVisibility();
                    return;
                }
                const n = getStopMotionFrameCount();
                if (n < 1) {
                    syncStopMotionOverlayOpacityGroupVisibility();
                    return;
                }
                const idx = n - 1;
                const blob = await stopMotionFrameStore.readBlob(idx);
                if (!stopMotionLastFrameOverlayEnabled) {
                    syncStopMotionOverlayOpacityGroupVisibility();
                    return;
                }
                const url = URL.createObjectURL(blob);
                stopMotionOverlayObjectUrl = url;
                stopMotionOverlayImg.src = url;
                stopMotionOverlayImg.hidden = false;
                stopMotionOverlayImg.style.transform = mirrorFeed ? 'scaleX(-1)' : 'scaleX(1)';
                applyStopMotionOverlayOpacityFromSlider();
            } catch (e) {
                console.warn('Stop motion overlay preview:', e);
            }
        }

        function applyStopMotionOverlayOpacityFromSlider() {
            if (!stopMotionOverlayOpacitySlider || !stopMotionOverlayImg) return;
            if (stopMotionOverlayOpacityGroup && stopMotionOverlayOpacityGroup.hidden) return;
            let p = parseInt(stopMotionOverlayOpacitySlider.value, 10);
            if (Number.isNaN(p)) p = 42;
            p = Math.min(100, Math.max(1, p));
            stopMotionOverlayOpacitySlider.value = String(p);
            stopMotionOverlayImg.style.opacity = String(p / 100);
            if (stopMotionOverlayOpacityValue) {
                stopMotionOverlayOpacityValue.textContent = p + '%';
            }
        }

        async function discardStopMotionLastFrame() {
            if (stopMotionEncoding || !stopMotionFrameStore || getStopMotionFrameCount() === 0) return;
            try {
                const ok = await stopMotionFrameStore.removeLastFrame();
                if (!ok) return;
            } catch (e) {
                console.error('Discard stop motion frame failed:', e);
                return;
            }
            updateStopMotionUi();
            await refreshStopMotionOverlayPreview();
        }

        function applyDigitalZoomFromSlider() {
            if (!videoDigitalZoom || !zoomSlider) return;
            let z = parseFloat(zoomSlider.value);
            if (Number.isNaN(z)) z = 1;
            z = Math.min(10, Math.max(1, z));
            videoDigitalZoom.style.transform = `scale(${z})`;
            if (zoomValueLabel) {
                zoomValueLabel.textContent = (Math.round(z * 10) / 10).toString().replace(/\.0$/, '') + '×';
            }
        }

        function updateZoomUI() {
            if (!zoomSlider) return;
            zoomSlider.min = '1';
            zoomSlider.max = '10';
            zoomSlider.step = '0.1';
            zoomSlider.value = '1';
            applyDigitalZoomFromSlider();
        }

        function getDigitalZoomFactor() {
            if (!zoomSlider) return 1;
            const z = parseFloat(zoomSlider.value);
            if (Number.isNaN(z)) return 1;
            return Math.min(10, Math.max(1, z));
        }

        /** Center rectangle in full frame that matches the digital zoom slider (same as CSS scale). */
        function getDigitalZoomSourceRect(vw, vh) {
            const z = getDigitalZoomFactor();
            const sw = vw / z;
            const sh = vh / z;
            return { sx: (vw - sw) / 2, sy: (vh - sh) / 2, sw, sh };
        }

        /** Center-crop to match CSS digital zoom, then scale to dest (recording / photo / timelapse). */
        function drawVideoWithDigitalZoom(ctx, destW, destH) {
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (!vw || !vh || destW < 1 || destH < 1) return;
            const { sx, sy, sw, sh } = getDigitalZoomSourceRect(vw, vh);
            if (mirrorFeed) {
                ctx.save();
                ctx.translate(destW, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, sx, sy, sw, sh, 0, 0, destW, destH);
                ctx.restore();
            } else {
                ctx.drawImage(video, sx, sy, sw, sh, 0, 0, destW, destH);
            }
        }

        let sharedCaptureFrameCanvas = null;
        let sharedCaptureFrameCtx = null;

        /** One reusable canvas for stop-motion / timelapse / photo to avoid allocating every frame. */
        function getSharedCaptureFrameCanvas(targetW, targetH) {
            const w = Math.max(1, Math.floor(targetW));
            const h = Math.max(1, Math.floor(targetH));
            if (!sharedCaptureFrameCanvas) {
                sharedCaptureFrameCanvas = document.createElement('canvas');
                sharedCaptureFrameCtx = sharedCaptureFrameCanvas.getContext('2d');
            }
            if (sharedCaptureFrameCanvas.width !== w || sharedCaptureFrameCanvas.height !== h) {
                sharedCaptureFrameCanvas.width = w;
                sharedCaptureFrameCanvas.height = h;
            }
            return { canvas: sharedCaptureFrameCanvas, ctx: sharedCaptureFrameCtx };
        }

        async function replaceAudioTrackInCurrentStream(deviceId) {
            if (!currentStream) return;
            try {
                // Stop and remove old audio tracks only (keep the video stream).
                currentStream.getAudioTracks().forEach(track => {
                    currentStream.removeTrack(track);
                    track.stop();
                });

                const audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        deviceId: deviceId,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000,
                        sampleSize: 16
                    }
                });

                audioStream.getAudioTracks().forEach(track => {
                    currentStream.addTrack(track);
                });

                // Keep the video element bound to the updated stream.
                video.srcObject = currentStream;
                updateDeviceInfo();
                updateMirroring();
            } catch (err) {
                console.error("Error replacing audio track: " + err);
            }
        }

        /** Prefer explicit resolution/FPS from the constraint dropdowns so the info block matches the top bar; fall back to track getSettings() for default / empty selects. */
        function resolveCameraInfoMetrics(settingsFromTrack = null) {
            const trackSettings =
                settingsFromTrack ||
                (currentStream &&
                    currentStream.getVideoTracks()[0] &&
                    currentStream.getVideoTracks()[0].getSettings &&
                    currentStream.getVideoTracks()[0].getSettings()) ||
                null;

            let w;
            let h;
            const resVal = cameraResolutionSelect && cameraResolutionSelect.value;
            if (resVal && String(resVal).toLowerCase().includes('x')) {
                const parts = String(resVal).toLowerCase().split('x');
                const pw = parseInt(parts[0], 10);
                const ph = parseInt(parts[1], 10);
                if (Number.isFinite(pw) && Number.isFinite(ph)) {
                    w = pw;
                    h = ph;
                }
            }
            if (!Number.isFinite(w) && trackSettings) {
                w = trackSettings.width;
                h = trackSettings.height;
            }

            let frameRate;
            const fpsVal = cameraFpsSelect && cameraFpsSelect.value;
            if (fpsVal != null && String(fpsVal).length > 0) {
                const pf = parseFloat(String(fpsVal).replace(',', '.'));
                if (Number.isFinite(pf)) frameRate = pf;
            }
            if (!Number.isFinite(frameRate) && trackSettings) {
                frameRate = trackSettings.frameRate;
            }

            return { w, h, frameRate };
        }

        function updateDeviceInfo(settings = null) {
            if (cameraList.length > 0) {
                let cameraText = t('prefixCamera', {
                    label: cameraList[currentCameraIndex].label || t('unknownDevice')
                });
                const m = resolveCameraInfoMetrics(settings);
                if (Number.isFinite(m.w) && Number.isFinite(m.h)) {
                    cameraText += '\n' + t('deviceLineResolution', { w: m.w, h: m.h });
                }
                if (Number.isFinite(m.frameRate)) {
                    cameraText += '\n' + t('deviceLineFps', { rate: m.frameRate });
                }
                cameraInfo.textContent = cameraText;
            } else {
                cameraInfo.textContent = t('cameraNone');
            }

            if (microphoneList.length > 0) {
                micInfo.textContent = t('micWithLabel', {
                    label: microphoneList[currentMicIndex].label || t('unknownDevice')
                });
            } else {
                micInfo.textContent = t('micNone');
            }
        }

        async function startRecording() {
            try {
                if (!currentStream) {
                    throw new Error(t('errNoCameraStream'));
                }
                if (getStopMotionFrameCount() > 0 || stopMotionEncoding) {
                    return;
                }

                // If we somehow have stale artifacts from an earlier attempt, remove them.
                cleanupCameraRecordingArtifacts();

                // Canvas mirroring: encode frames from a canvas so Mirror updates immediately in the recorded output.
                const videoTrack = currentStream.getVideoTracks()[0];
                const settings = (videoTrack && videoTrack.getSettings) ? videoTrack.getSettings() : {};
                const w = Math.max(1, Math.floor(settings.width || video.videoWidth || 1280));
                const h = Math.max(1, Math.floor(settings.height || video.videoHeight || 720));

                cameraRecordingCanvas = document.createElement('canvas');
                cameraRecordingCanvas.width = w;
                cameraRecordingCanvas.height = h;
                cameraRecordingCtx = cameraRecordingCanvas.getContext('2d');

                const fps = 30;
                cameraCanvasStream = cameraRecordingCanvas.captureStream(fps);
                const canvasVideoTrack = cameraCanvasStream.getVideoTracks()[0];

                // Audio muting without restarting (camera mode): route audio through a GainNode.
                let composedStreamTracks = [canvasVideoTrack];

                const audioTracks = currentStream.getAudioTracks ? currentStream.getAudioTracks() : [];
                if (audioTracks && audioTracks.length > 0) {
                    cameraAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    cameraAudioGainNode = cameraAudioContext.createGain();
                    cameraAudioGainNode.gain.value = isMutedVideoAudio ? 0 : 1;

                    const audioOnlyStream = new MediaStream(audioTracks);
                    cameraAudioSourceNode = cameraAudioContext.createMediaStreamSource(audioOnlyStream);
                    cameraAudioDest = cameraAudioContext.createMediaStreamDestination();

                    cameraAudioSourceNode.connect(cameraAudioGainNode);
                    cameraAudioGainNode.connect(cameraAudioDest);

                    composedStreamTracks = [
                        canvasVideoTrack,
                        ...cameraAudioDest.stream.getAudioTracks()
                    ];
                }

                const composedStream = new MediaStream(composedStreamTracks);

                const diskSink = await openRecordingDiskSink(getTimestamp() + 'video.webm');
                const noticeEl = document.getElementById('recordingStatusNotice');
                if (noticeEl) {
                    noticeEl.hidden = true;
                    noticeEl.textContent = '';
                }
                if (diskSink.mode === 'cancelled') {
                    showRecordingStatusNotice(t('recordingSaveCancelled'), false);
                    cleanupCameraRecordingArtifacts();
                    return;
                }

                cameraRecordingDiskMode = diskSink.mode === 'disk';
                cameraRecordingWritable = diskSink.mode === 'disk' ? diskSink.writable : null;
                cameraRecordingOpfsFileHandle = diskSink.fileHandle || null;
                cameraRecordingOpfsDispose =
                    typeof diskSink.opfsDispose === 'function' ? diskSink.opfsDispose : null;
                cameraRecordingDiskWriteQueue = Promise.resolve();
                recordedChunks = [];

                const options = {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: pickVideoBitrateForResolution(w, h),
                    audioBitsPerSecond: 128000
                };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'video/webm;codecs=vp8,opus';
                }

                mediaRecorder = new MediaRecorder(composedStream, options);

                mediaRecorder.ondataavailable = (event) => {
                    const chunk = event.data;
                    if (cameraRecordingDiskMode && cameraRecordingWritable) {
                        queueCameraDiskWrite(chunk);
                    } else if (chunk && chunk.size > 0) {
                        recordedChunks.push(chunk);
                    }
                };

                mediaRecorder.onstop = () => {
                    void (async () => {
                        const writableRef = cameraRecordingWritable;
                        const diskMode = cameraRecordingDiskMode;
                        try {
                            if (diskMode && writableRef) {
                                await cameraRecordingDiskWriteQueue.catch(() => {});
                                await writableRef.close();
                                cameraRecordingWritable = null;
                                cameraRecordingDiskMode = false;
                                cameraRecordingDiskWriteQueue = Promise.resolve();
                                const fhLoc = cameraRecordingOpfsFileHandle;
                                const dispLoc = cameraRecordingOpfsDispose;
                                cameraRecordingOpfsFileHandle = null;
                                cameraRecordingOpfsDispose = null;
                                if (fhLoc) {
                                    await finalizeOpfsRecordingToDownload(
                                        fhLoc,
                                        getTimestamp() + 'video.webm',
                                        dispLoc
                                    );
                                }
                            } else {
                                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.style.display = 'none';
                                a.href = url;
                                a.download = getTimestamp() + 'video.webm';
                                document.body.appendChild(a);
                                a.click();
                                URL.revokeObjectURL(url);
                            }
                        } catch (e) {
                            console.error('Camera recording finalize:', e);
                            showRecordingStatusNotice(t('recordingDiskWriteFailed'), true);
                            try {
                                if (writableRef) {
                                    await writableRef.abort();
                                }
                            } catch (e2) {}
                            cameraRecordingWritable = null;
                            cameraRecordingDiskMode = false;
                            cameraRecordingDiskWriteQueue = Promise.resolve();
                            if (cameraRecordingOpfsDispose) {
                                try {
                                    await cameraRecordingOpfsDispose();
                                } catch (e4) {}
                                cameraRecordingOpfsDispose = null;
                                cameraRecordingOpfsFileHandle = null;
                            }
                            if (recordedChunks.length > 0) {
                                try {
                                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.style.display = 'none';
                                    a.href = url;
                                    a.download = getTimestamp() + 'video-fallback.webm';
                                    document.body.appendChild(a);
                                    a.click();
                                    URL.revokeObjectURL(url);
                                } catch (e3) {}
                            }
                        } finally {
                            cleanupCameraRecordingArtifacts();
                        }
                    })();
                };

                mediaRecorder.start(RECORDING_TIMESLICE_MS);
                if (!cameraRecordingDiskMode) {
                    maybeShowRecordingMemoryHint();
                }
                cameraRecordingActive = true;
                updateCameraConstraintControlsState();
                
                const drawFrame = () => {
                    if (!cameraRecordingActive || !cameraRecordingCtx) return;
                    cameraRecordingCtx.clearRect(0, 0, w, h);
                    drawVideoWithDigitalZoom(cameraRecordingCtx, w, h);
                    cameraDrawRequestId = requestAnimationFrame(drawFrame);
                };

                cameraDrawRequestId = requestAnimationFrame(drawFrame);

                recordButton.textContent = t('btnStopRecord');
                recordButton.classList.add('recording');
                recordButton.setAttribute('aria-pressed', 'true');
                syncRecordingModeButtons();
            } catch (err) {
                console.error("Error starting recording: " + err);
                cleanupCameraRecordingArtifacts();
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                try {
                    if (typeof mediaRecorder.requestData === 'function') {
                        mediaRecorder.requestData();
                    }
                } catch (e) {}
                mediaRecorder.stop();
            }

            cameraRecordingActive = false;

            try {

            } catch (e) {}

            cameraCanvasStream = null;
            cameraRecordingCtx = null;
            cameraRecordingCanvas = null;

            try {
                if (cameraAudioGainNode) {
                    cameraAudioGainNode.disconnect();
                }
                if (cameraAudioSourceNode) {
                    cameraAudioSourceNode.disconnect();
                }
            } catch (e) {}
            try {
                if (cameraAudioDest) {

            try {
                if (cameraAudioContext && cameraAudioContext.state !== 'closed') {
                    cameraAudioContext.close();
                }
            } catch (e) {}

            cameraAudioGainNode = null;
            cameraAudioSourceNode = null;
            cameraAudioDest = null;

                    if (node.textContent.toLowerCase().includes('MediaCreationTool is sharing')) {

                        }
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    // Recursively search child nodes
                    node.childNodes.forEach(findAndHideElement);

            }

        function createIsolatedContainer(targetRect = null) {
            // Create an iframe to isolate the video.
            // If targetRect is provided, we render the preview into the same
            // viewport area as the camera video to avoid full-screen stacking.
            const iframe = document.createElement('iframe');
            const top = targetRect ? `${targetRect.top}px` : '0';
            const left = targetRect ? `${targetRect.left}px` : '0';
            const width = targetRect ? `${targetRect.width}px` : '100%';
            const height = targetRect ? `${targetRect.height}px` : '100%';

            iframe.style.cssText = `
                position: fixed;
                top: ${top};
                left: ${left};
                width: ${width};
                height: ${height};
                border: none;
                z-index: 999999;
                background: transparent;
                overflow: hidden;
                pointer-events: none;
            `;
            document.body.appendChild(iframe);
            
            // Get the iframe's document
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            
            // Create a container for the video
            const container = iframeDoc.createElement('div');
            container.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: transparent;
            `;
            iframeDoc.body.appendChild(container);
            
            return { iframe, container };
        }

        function setupNotificationHider() {
            // Previous mutation observer code
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === Node.ELEMENT_NODE) {
                                hideElement(node);
                                // Also check shadow DOM
                                if (node.shadowRoot) {
                                    hideElement(node.shadowRoot);
                                    const shadowObserver = new MutationObserver((shadowMutations) => {
                                        shadowMutations.forEach(m => {
                                            m.addedNodes.forEach(n => hideElement(n));
                                        });
                                    });
                                    shadowObserver.observe(node.shadowRoot, {
                                        childList: true,
                                        subtree: true,
                                        attributes: true
                                    });
                                }
                            }
                        });
                    }
                });
            });

            // Observe both document and any shadow roots
            observer.observe(document.documentElement, {
                childList: true,
                subtree: true,
                attributes: true
            });

            // Also try to find and observe any existing shadow roots
            document.querySelectorAll('*').forEach(el => {
                if (el.shadowRoot) {
                    observer.observe(el.shadowRoot, {
                        childList: true,
                        subtree: true,
                        attributes: true
                    });
                }
            });

            return observer;
        }

        function hideElement(element) {
            if (element.nodeType !== Node.ELEMENT_NODE) return;
            // Never hide the user's PiP/corner preview.
            if (element.classList && (element.classList.contains('pip-video') || element.classList.contains('pip-container'))) {
                return;

            if (element.id === 'timelapseInfoPanel') {
                return;

            const text = (element.textContent || '').toLowerCase();
            const className = (element.className || '').toLowerCase();
            const id = (element.id || '').toLowerCase();
            
            // Check for sharing indicators including Edge-specific patterns
            if ((text.includes('sharing') || 
                 text.includes('MediaCreationTool') ||
                 text.includes('screen') ||
                 text.includes('recording') ||
                 text.includes('is sharing your') ||  // Edge-specific text
                 text.includes('wants to share') ||   // Edge-specific text
                 className.includes('edge-') ||
                 className.includes('ms-') ||
                 className.includes('microsoftedge') ||
                 id.includes('edge-') ||
                 id.includes('sharing')) &&
                (style.position === 'fixed' || 
                 className.includes('notification') ||
                 className.includes('sharing') ||
                 className.includes('toast') ||
                 className.includes('banner') ||
                 className.includes('informationbar') ||
                 className.includes('statusmessage') ||
                 element.getAttribute('role') === 'status' ||
                 element.getAttribute('role') === 'alert' ||
                 element.getAttribute('aria-live') === 'polite' ||
                 element.getAttribute('aria-live') === 'assertive')) {
                
                // Force hide using multiple techniques including Edge-specific ones
                element.style.cssText = `
                    display: none !important;
                    visibility: hidden !important;
                    opacity: 0 !important;
                    position: fixed !important;
                    z-index: -999999 !important;
                    height: 0 !important;
                    width: 0 !important;
                    min-height: 0 !important;
                    min-width: 0 !important;
                    max-height: 0 !important;
                    max-width: 0 !important;
                    padding: 0 !important;
                    margin: 0 !important;
                    border: 0 !important;
                    clip: rect(0, 0, 0, 0) !important;
                    pointer-events: none !important;
                    transform: translateY(-9999px) scale(0) !important;
                    filter: opacity(0) !important;
                    -ms-high-contrast-adjust: none !important;  /* Edge-specific */
                    -ms-transform: translateY(-9999px) !important;  /* Edge-specific */
                `;
                
                // Try multiple ways to remove/hide the element
                try {
                    element.remove();
                } catch (e) {
                    try {
                        element.parentNode.removeChild(element);
                    } catch (e2) {
                        element.innerHTML = '';
                        element.setAttribute('aria-hidden', 'true');
                        element.setAttribute('hidden', 'true');
                        // Edge-specific attributes
                        element.setAttribute('data-ms-hide', 'true');
                        element.setAttribute('data-edge-hidden', 'true');
                    }
                }
            }

            // Recursively check all children
            Array.from(element.children).forEach(hideElement);
        }

        async function startScreenRecording() {
            try {
                if (screenCaptureStarting) return;
                if (getStopMotionFrameCount() > 0 || stopMotionEncoding) return;
                screenCaptureStarting = true;
                toggleScreenRecordingButton.disabled = true;

                // Inject Edge-specific CSS
                injectEdgeNotificationCSS();

                // Create isolated container
                if (window.isolatedContainer && window.isolatedContainer.iframe) {
                    try { window.isolatedContainer.iframe.remove(); } catch (e) {}
                    window.isolatedContainer = null;
                }
                // Create isolated container (same size as camera preview)
                const rect = video.getBoundingClientRect();
                const targetRect = (rect && rect.width > 0 && rect.height > 0) ? rect : null;
                const { iframe, container } = createIsolatedContainer(targetRect);
                window.isolatedContainer = { iframe, container };

                // Setup notification hiding
                const observer = setupNotificationHider();
                window.notificationObserver = observer;

                // Get screen capture stream
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: "monitor",
                        logicalSurface: true,
                        cursor: "always",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        frameRate: { ideal: 30, max: 60 }
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 48000,
                        suppressLocalAudioPlayback: false
                    },
                    systemAudio: "include"
                });

                // Move video to isolated container
                const screenPreviewVideo = document.createElement('video');
                screenPreviewVideo.srcObject = screenStream;
                screenPreviewVideo.autoplay = true;
                screenPreviewVideo.playsInline = true;
                screenPreviewVideo.style.width = '100%';
                screenPreviewVideo.style.height = '100%';
                screenPreviewVideo.style.objectFit = 'cover';
                container.appendChild(screenPreviewVideo);

                // Additional hiding attempts after getDisplayMedia
                setTimeout(aggressiveHideNotifications, 0);
                setTimeout(aggressiveHideNotifications, 100);
                setTimeout(aggressiveHideNotifications, 500);
                setTimeout(aggressiveHideNotifications, 1000);

                screenPreviewVideoEl = screenPreviewVideo;

                // Canvas mirroring so Mirror updates the RECORDED output instantly.
                const screenVideoTrack = screenStream.getVideoTracks()[0];
                const screenSettings = (screenVideoTrack && screenVideoTrack.getSettings) ? screenVideoTrack.getSettings() : {};
                const w = Math.max(1, Math.floor(screenSettings.width || 1920));
                const h = Math.max(1, Math.floor(screenSettings.height || 1080));

                screenRecordingCanvas = document.createElement('canvas');
                screenRecordingCanvas.width = w;
                screenRecordingCanvas.height = h;
                screenRecordingCtx = screenRecordingCanvas.getContext('2d');

                const fps = 30;
                screenCanvasStream = screenRecordingCanvas.captureStream(fps);
                const canvasVideoTrack = screenCanvasStream.getVideoTracks()[0];

                // Always include audio; the Mute button will control gain during active recording.
                const audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        deviceId: currentMicDeviceId || undefined,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000,
                        sampleSize: 16
                    }
                });
                screenMicAudioStream = audioStream;

                // Route both system-audio (screenStream) + mic audio (audioStream) through one GainNode.
                const allAudioTracks = [
                    ...screenStream.getAudioTracks(),
                    ...audioStream.getAudioTracks()
                ];

                let composedStreamTracks = [canvasVideoTrack];
                if (allAudioTracks.length > 0) {
                    screenAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    screenAudioGainNode = screenAudioContext.createGain();
                    screenAudioGainNode.gain.value = isMutedVideoAudio ? 0 : 1;

                    const audioOnlyStream = new MediaStream(allAudioTracks);
                    const source = screenAudioContext.createMediaStreamSource(audioOnlyStream);
                    screenAudioDest = screenAudioContext.createMediaStreamDestination();

                    source.connect(screenAudioGainNode);
                    screenAudioGainNode.connect(screenAudioDest);

                    composedStreamTracks = [
                        canvasVideoTrack,
                        ...screenAudioDest.stream.getAudioTracks()
                    ];
                }

                const composedStream = new MediaStream(composedStreamTracks);

                const screenDiskSink = await openRecordingDiskSink(getTimestamp() + 'screen.webm');
                const screenNoticeEl = document.getElementById('recordingStatusNotice');
                if (screenNoticeEl) {
                    screenNoticeEl.hidden = true;
                    screenNoticeEl.textContent = '';
                }
                if (screenDiskSink.mode === 'cancelled') {
                    showRecordingStatusNotice(t('recordingSaveCancelled'), false);
                    screenRecordingActive = false;
                    cleanupScreenRecordingArtifacts();
                    try {
                        if (screenStream) screenStream.getTracks().forEach((t) => t.stop());
                    } catch (e) {}
                    screenStream = null;
                    try {
                        if (screenPreviewVideoEl && screenPreviewVideoEl.parentNode) {
                            screenPreviewVideoEl.remove();
                        }
                    } catch (e) {}
                    if (window.notificationObserver) {
                        try {
                            window.notificationObserver.disconnect();
                        } catch (e) {}
                        window.notificationObserver = null;
                    }
                    if (window.isolatedContainer && window.isolatedContainer.iframe) {
                        try {
                            window.isolatedContainer.iframe.remove();
                        } catch (e) {}
                    }
                    window.isolatedContainer = null;
                    screenCaptureStarting = false;
                    toggleScreenRecordingButton.disabled = false;
                    syncRecordingModeButtons();

                screenRecordingDiskMode = screenDiskSink.mode === 'disk';
                screenRecordingWritable = screenDiskSink.mode === 'disk' ? screenDiskSink.writable : null;
                screenRecordingOpfsFileHandle = screenDiskSink.fileHandle || null;
                screenRecordingOpfsDispose =
                    typeof screenDiskSink.opfsDispose === 'function' ? screenDiskSink.opfsDispose : null;
                screenRecordingDiskWriteQueue = Promise.resolve();
                screenRecordedChunks = [];

                const screenRecOptions = {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: 12000000,
                    audioBitsPerSecond: 128000
                };
                if (!MediaRecorder.isTypeSupported(screenRecOptions.mimeType)) {
                    screenRecOptions.mimeType = 'video/webm;codecs=vp8,opus';
                }

                screenMediaRecorder = new MediaRecorder(composedStream, screenRecOptions);

                screenMediaRecorder.ondataavailable = (event) => {
                    const chunk = event.data;
                    if (screenRecordingDiskMode && screenRecordingWritable) {
                        queueScreenDiskWrite(chunk);
                    } else if (chunk && chunk.size > 0) {
                        screenRecordedChunks.push(chunk);

                    void (async () => {
                        const writableRef = screenRecordingWritable;
                        const diskMode = screenRecordingDiskMode;

                            if (diskMode && writableRef) {
                                await screenRecordingDiskWriteQueue.catch(() => {});
                                await writableRef.close();
                                screenRecordingWritable = null;
                                screenRecordingDiskMode = false;
                                screenRecordingDiskWriteQueue = Promise.resolve();
                                const fhLoc = screenRecordingOpfsFileHandle;
                                const dispLoc = screenRecordingOpfsDispose;
                                screenRecordingOpfsFileHandle = null;
                                screenRecordingOpfsDispose = null;
                                if (fhLoc) {
                                    await finalizeOpfsRecordingToDownload(
                                        fhLoc,
                                        getTimestamp() + 'screen.webm',
                                        dispLoc
                                    );
                                }
                            } else {
                                const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.style.display = 'none';
                                a.href = url;
                                a.download = getTimestamp() + 'screen.webm';
                                document.body.appendChild(a);
                                a.click();
                                URL.revokeObjectURL(url);
                            }
                        } catch (e) {
                            console.error('Screen recording finalize:', e);
                            showRecordingStatusNotice(t('recordingDiskWriteFailed'), true);
                            try {
                                if (writableRef) {
                                    await writableRef.abort();
                                }
                            } catch (e2) {}
                            screenRecordingWritable = null;
                            screenRecordingDiskMode = false;
                            screenRecordingDiskWriteQueue = Promise.resolve();
                            if (screenRecordingOpfsDispose) {
                                try {
                                    await screenRecordingOpfsDispose();
                                } catch (e4) {}
                                screenRecordingOpfsDispose = null;
                                screenRecordingOpfsFileHandle = null;
                            }
                            if (screenRecordedChunks.length > 0) {
                                try {
                                    const blob = new Blob(screenRecordedChunks, { type: 'video/webm' });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.style.display = 'none';
                                    a.href = url;
                                    a.download = getTimestamp() + 'screen-fallback.webm';
                                    document.body.appendChild(a);
                                    a.click();
                                    URL.revokeObjectURL(url);
                                } catch (e3) {}
                            }
                        } finally {
                            cleanupScreenRecordingArtifacts();
                        }

                };
                screenDrawRequestId = requestAnimationFrame(drawFrame);

                screenMediaRecorder.start(RECORDING_TIMESLICE_MS);
                if (!screenRecordingDiskMode) {

                toggleScreenRecordingButton.textContent = t('btnStopScreen');
                toggleScreenRecordingButton.classList.add('recording');
                toggleScreenRecordingButton.setAttribute('aria-pressed', 'true');

                    stopScreenRecordingExternally();

            } catch (err) {
                console.error("Error starting screen recording: " + err);
                screenCaptureStarting = false;
                toggleScreenRecordingButton.disabled = false;
                if (window.notificationObserver) {
                    window.notificationObserver.disconnect();

                if (window.isolatedContainer) {
                    window.isolatedContainer.iframe.remove();

        }

        function stopScreenRecordingExternally() {
            screenCaptureStarting = false;
            toggleScreenRecordingButton.disabled = false;

            screenRecordingActive = false;
            if (screenDrawRequestId) {

        function cleanupScreenRecordingArtifacts() {
            try {
                screenRecordingActive = false;
                if (screenRecordingWritable) {
                    const w = screenRecordingWritable;
                    screenRecordingWritable = null;
                    screenRecordingDiskMode = false;
                    screenRecordingDiskWriteQueue = Promise.resolve();
                    void closeRecordingWritableQuietly(w);
                } else {
                    screenRecordingDiskMode = false;
                    screenRecordingDiskWriteQueue = Promise.resolve();
                }
                if (screenRecordingOpfsDispose) {
                    const d = screenRecordingOpfsDispose;
                    screenRecordingOpfsDispose = null;
                    screenRecordingOpfsFileHandle = null;
                    void d().catch(() => {});
                }
                if (screenDrawRequestId) {
                    cancelAnimationFrame(screenDrawRequestId);
                    screenDrawRequestId = null;
                }
            } catch (e) {}

            try {
                if (screenCanvasStream) {
                    screenCanvasStream.getTracks().forEach(track => track.stop());

            } catch (e) {}

            screenCanvasStream = null;
            screenRecordingCtx = null;
            screenRecordingCanvas = null;

            try {

        function startAudioRecording() {
            if (getStopMotionFrameCount() > 0 || stopMotionEncoding) return;
            const audioConstraints = currentMicDeviceId
                ? { deviceId: currentMicDeviceId }
                : true;

            navigator.mediaDevices
                .getUserMedia({ audio: audioConstraints })
                .then(async (stream) => {
                    const sink = await openRecordingDiskSink(getTimestamp() + 'audio.webm', 'audio');
                    const noticeEl = document.getElementById('recordingStatusNotice');
                    if (noticeEl) {
                        noticeEl.hidden = true;
                        noticeEl.textContent = '';
                    }
                    if (sink.mode === 'cancelled') {
                        showRecordingStatusNotice(t('recordingSaveCancelled'), false);
                        try {
                            stream.getTracks().forEach((t) => t.stop());
                        } catch (e) {}
                        return;
                    }

                    const preferMime =
                        typeof MediaRecorder !== 'undefined' &&
                        MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                            ? 'audio/webm;codecs=opus'
                            : 'audio/webm';
                    let rec;
                    try {
                        rec = new MediaRecorder(stream, { mimeType: preferMime });
                    } catch (e) {
                        try {
                            rec = new MediaRecorder(stream);
                        } catch (e2) {
                            console.error('Audio MediaRecorder init failed:', e2);
                            if (sink.mode === 'disk' && sink.writable) {
                                void closeRecordingWritableQuietly(sink.writable);
                            }
                            if (typeof sink.opfsDispose === 'function') {
                                void sink.opfsDispose().catch(() => {});
                            }
                            try {
                                stream.getTracks().forEach((t) => t.stop());
                            } catch (e3) {}
                            return;
                        }
                    }
                    audioRecorder = rec;
                    audioRecordStream = stream;
                    audioRecordingDiskMode = sink.mode === 'disk';
                    audioRecordingWritable = sink.mode === 'disk' ? sink.writable : null;
                    audioRecordingOpfsFileHandle = sink.fileHandle || null;
                    audioRecordingOpfsDispose =
                        typeof sink.opfsDispose === 'function' ? sink.opfsDispose : null;
                    audioRecordingDiskWriteQueue = Promise.resolve();
                    audioChunks = [];

                    rec.ondataavailable = (event) => {
                        const chunk = event.data;
                        if (audioRecordingDiskMode && audioRecordingWritable) {
                            queueAudioDiskWrite(chunk);
                        } else if (chunk && chunk.size > 0) {
                            audioChunks.push(chunk);
                        }
                    };

                    rec.onstop = () => {
                        void (async () => {
                            const suppress = suppressAudioDownload;
                            suppressAudioDownload = false;
                            const writableRef = audioRecordingWritable;
                            const diskMode = audioRecordingDiskMode;
                            const mime = rec.mimeType || 'audio/webm';
                            try {
                                if (suppress && diskMode && writableRef) {
                                    await audioRecordingDiskWriteQueue.catch(() => {});
                                    try {
                                        await writableRef.abort();
                                    } catch (e) {}
                                    audioRecordingWritable = null;
                                    audioRecordingDiskMode = false;
                                    audioRecordingDiskWriteQueue = Promise.resolve();
                                    if (audioRecordingOpfsDispose) {
                                        try {
                                            await audioRecordingOpfsDispose();
                                        } catch (e) {}
                                        audioRecordingOpfsDispose = null;
                                        audioRecordingOpfsFileHandle = null;
                                    }
                                } else if (diskMode && writableRef) {
                                    await audioRecordingDiskWriteQueue.catch(() => {});
                                    await writableRef.close();
                                    audioRecordingWritable = null;
                                    audioRecordingDiskMode = false;
                                    audioRecordingDiskWriteQueue = Promise.resolve();
                                    const fhLoc = audioRecordingOpfsFileHandle;
                                    const dispLoc = audioRecordingOpfsDispose;
                                    audioRecordingOpfsFileHandle = null;
                                    audioRecordingOpfsDispose = null;
                                    if (fhLoc) {
                                        await finalizeOpfsRecordingToDownload(
                                            fhLoc,
                                            getTimestamp() + 'audio.webm',
                                            dispLoc
                                        );
                                    }
                                } else if (!suppress) {
                                    const chunkCopy = audioChunks.slice();
                                    const blob = new Blob(chunkCopy, { type: mime });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.style.display = 'none';
                                    a.href = url;
                                    a.download = getTimestamp() + 'audio.webm';
                                    document.body.appendChild(a);
                                    a.click();
                                    URL.revokeObjectURL(url);
                                }
                            } catch (e) {
                                console.error('Audio recording finalize:', e);
                                showRecordingStatusNotice(t('recordingDiskWriteFailed'), true);
                                try {
                                    if (writableRef) {
                                        await writableRef.abort();
                                    }
                                } catch (e2) {}
                                audioRecordingWritable = null;
                                audioRecordingDiskMode = false;
                                audioRecordingDiskWriteQueue = Promise.resolve();
                                if (audioRecordingOpfsDispose) {
                                    try {
                                        await audioRecordingOpfsDispose();
                                    } catch (e3) {}
                                    audioRecordingOpfsDispose = null;
                                    audioRecordingOpfsFileHandle = null;
                                }
                                if (!suppress && audioChunks.length > 0) {
                                    try {
                                        const blob = new Blob(audioChunks.slice(), { type: mime });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.style.display = 'none';
                                        a.href = url;
                                        a.download = getTimestamp() + 'audio-fallback.webm';
                                        document.body.appendChild(a);
                                        a.click();
                                        URL.revokeObjectURL(url);
                                    } catch (e3) {}
                                }
                            } finally {
                                try {
                                    if (audioRecordStream) {
                                        audioRecordStream.getTracks().forEach((t) => t.stop());
                                        audioRecordStream = null;
                                    }
                                } catch (e) {}
                                audioRecorder = null;
                                audioChunks = [];
                            }
                        })();
                    };

                    rec.start(RECORDING_TIMESLICE_MS);
                    if (!audioRecordingDiskMode) {
                        maybeShowRecordingMemoryHint();
                    }
                    toggleAudioRecordingButton.textContent = t('btnStopAudio');
                    toggleAudioRecordingButton.classList.add('recording');
                    toggleAudioRecordingButton.setAttribute('aria-pressed', 'true');
                    syncRecordingModeButtons();
                })
                .catch((err) => {
                    console.error('Error starting audio recording: ' + err);
                });
        }

        function stopAudioRecording() {

        function takePhoto() {

        function updateStopMotionUi() {

        async function captureStopMotionFrame() {
            if (!currentStream || stopMotionEncoding) return;
            try {
                if (!stopMotionFrameStore) {
                    stopMotionFrameStore = await createFrameStore('sm');
                }
                const w = video.videoWidth || 1280;
